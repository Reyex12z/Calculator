<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/mathjs@14.0.1/lib/browser/math.js"></script>
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <main>
        <section class="calculator">
            <div class="cal-display">
                <p></p>
            </div>

            <div class="cal-content">
                <div class="cal-content-top">
                    <button class="cal-content-top-btn" style="color: rgba(255, 0, 0, 0.795);" id="clear"> C </button>
                    <button class="cal-content-top-btn" id="square"> x² </button>
                    <button class="cal-content-top-btn" id="root"> √x </button>
                    <button class="cal-content-top-btn" id="backSpace"> ⌫ </button>
                </div>

                <!-- contains numbers and operators container each-->
                <div class="cal-content-bottom">

                    <div class="cal-nums"> 
                        <div class="cal-nums-row">
                            <button class="cal-num"> 9 </button>
                            <button class="cal-num"> 8 </button>
                            <button class="cal-num"> 7 </button>
                        </div>

                        <div class="cal-nums-row">
                            <button class="cal-num"> 6 </button>
                            <button class="cal-num"> 5 </button>
                            <button class="cal-num"> 4 </button>                            
                        </div>

                        <div class="cal-nums-row">
                            <button class="cal-num"> 3 </button>
                            <button class="cal-num"> 2 </button>
                            <button class="cal-num"> 1 </button>                            
                        </div>

                        <div class="cal-nums-row">
                            <button class="cal-num" id="dbzero">00</button>
                            <button class="cal-num" id="num-zero"> 0 </button>
                            <button class="cal-num" id="dot"> . </button>                            
                        </div>

                    </div>

                    <div class="calc-operations">
                        <button class="cal-operator"> + </button>
                        <button class="cal-operator"> - </button>
                        <button class="cal-operator"> × </button>
                        <button class="cal-operator"> ÷ </button>
                        
                        <button class="cal-operator" id="equals"> = </button>
                    </div>
                </div>

            </div>
        </section>
    </main>
</body>
</html>
